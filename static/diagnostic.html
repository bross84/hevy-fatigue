<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagnostics</title>
  <link rel="icon" href="/resources/favicon.png" type="image/png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* Theme tokens (dark) */
    :root {
      --bg: #2e282a;
      --card: #3d3638;
      --border: #524c4e;
      --text: #f3f8f2;
      --muted: #a09498;
      --accent: #5da9e9;
      --danger: #ef3e36;
    }
    
    html { overflow-x: auto; }
    body {
      width: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 1rem;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    header {
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    
    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .header-meta {
      font-size: 12px;
      color: var(--muted);
    }
    
    .header-meta a {
      color: var(--accent);
      text-decoration: none;
    }
    
    .header-meta a:hover {
      text-decoration: underline;
    }
    
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--accent);
    }
    
    /* Section 1: Subjective Fatigue */
    .fatigue-score {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    
    .fatigue-details {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.5rem 0;
      font-size: 13px;
    }
    
    .detail-label {
      color: var(--muted);
      flex: 1;
    }
    
    .detail-value {
      font-weight: 600;
      text-align: right;
    }
    
    .score-box {
      background: rgba(93, 169, 233, 0.1);
      border: 1px solid var(--accent);
      border-radius: 4px;
      padding: 1rem;
      text-align: center;
    }
    
    .score-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .score-number {
      font-size: 48px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--accent);
    }
    
    .score-range {
      font-size: 11px;
      color: var(--muted);
      margin-top: 0.5rem;
    }
    
    /* Section 2: 7-Day Volume */
    .volume-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    
    th {
      text-align: left;
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.05em;
    }
    
    td {
      padding: 0.75rem 0.5rem;
      border-bottom: 1px solid rgba(82, 76, 78, 0.5);
    }
    
    tr:last-child td {
      border-bottom: 1px solid var(--border);
    }
    
    .volume-value {
      font-family: 'Courier New', monospace;
      text-align: right;
      font-weight: 600;
    }
    
    .volume-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1rem;
    }
    
    .summary-box {
      background: rgba(93, 169, 233, 0.1);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem;
      text-align: center;
    }
    
    .summary-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
    }
    
    .summary-value {
      font-size: 24px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--accent);
    }
    
    .summary-note {
      font-size: 10px;
      color: var(--muted);
      margin-top: 0.25rem;
    }
    
    /* Section 3: Raw Numbers */
    .raw-numbers {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2rem;
    }
    
    .raw-box {
      text-align: center;
    }
    
    .raw-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }
    
    .raw-number {
      font-size: 56px;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: var(--accent);
    }
    
    /* Error & Loading States */
    .error {
      background: rgba(239, 62, 54, 0.1);
      border: 1px solid var(--danger);
      border-radius: 4px;
      padding: 1rem;
      color: var(--text);
      font-size: 13px;
    }
    
    .placeholder {
      color: var(--muted);
      font-size: 13px;
      padding: 1rem;
      text-align: center;
      border: 1px solid var(--border);
      border-radius: 4px;
    }
    
    .loading {
      color: var(--muted);
      font-style: italic;
    }

    /* Section 4: AI Assistant */
    .ai-section { display: flex; flex-direction: column; gap: 1rem; }
    .ai-config { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .ai-config select { background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 0.35rem 0.6rem; font-size: 12px; cursor: pointer; }
    .ai-config label { font-size: 12px; color: var(--muted); }
    .ai-context-toggle { font-size: 12px; color: var(--accent); background: none; border: none; cursor: pointer; padding: 0; text-decoration: underline; }
    .ai-context-preview { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 0.75rem; font-size: 11px; color: var(--muted); font-family: 'Courier New', monospace; white-space: pre-wrap; max-height: 120px; overflow-y: auto; display: none; }
    .ai-messages { display: flex; flex-direction: column; gap: 0.75rem; min-height: 80px; max-height: 420px; overflow-y: auto; padding: 0.25rem 0; }
    .ai-msg { display: flex; flex-direction: column; gap: 0.25rem; max-width: 88%; }
    .ai-msg.user { align-self: flex-end; }
    .ai-msg.assistant { align-self: flex-start; }
    .ai-msg-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .ai-msg.user .ai-msg-label { text-align: right; }
    .ai-msg-bubble { padding: 0.6rem 0.85rem; border-radius: 4px; font-size: 13px; line-height: 1.55; }
    .ai-msg.user .ai-msg-bubble { background: rgba(93, 169, 233, 0.15); border: 1px solid rgba(93, 169, 233, 0.3); color: var(--text); }
    .ai-msg.assistant .ai-msg-bubble { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
    .ai-msg.assistant .ai-msg-bubble.streaming { opacity: 0.8; }
    .ai-input-row { display: flex; gap: 0.5rem; align-items: flex-end; }
    .ai-input { flex: 1; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 3px; padding: 0.5rem 0.75rem; font-size: 13px; font-family: inherit; resize: none; min-height: 38px; max-height: 120px; line-height: 1.5; }
    .ai-input:focus { outline: none; border-color: var(--accent); }
    .ai-send-btn { background: var(--accent); color: var(--bg); border: none; border-radius: 3px; padding: 0.5rem 1rem; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; height: 38px; }
    .ai-send-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .ai-clear-btn { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 3px; padding: 0.5rem 0.75rem; font-size: 12px; cursor: pointer; height: 38px; }
    .ai-clear-btn:hover { color: var(--text); }
    .ai-status { font-size: 11px; color: var(--muted); min-height: 16px; }
    .ai-status.error { color: var(--danger); }
    
    /* Responsive */
    @media (max-width: 768px) {
      .fatigue-score {
        grid-template-columns: 1fr;
      }
      
      .volume-summary {
        grid-template-columns: 1fr;
      }
      
      .raw-numbers {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
      
      .score-number {
        font-size: 36px;
      }
      
      .raw-number {
        font-size: 42px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Diagnostics</h1>
      <div class="header-meta">
        <span id="last-updated"></span>
        <span> · </span>
        <a href="/">Back to Dashboard</a>
        <span> · </span>
        <button id="refresh-btn" style="
          background: var(--accent);
          color: var(--bg);
          border: none;
          border-radius: 3px;
          padding: 0.25rem 0.75rem;
          font-size: 12px;
          cursor: pointer;
          font-weight: 600;
        ">Refresh</button>
      </div>
    </header>
    
    <div id="diagnostics">
      <div class="placeholder loading">Loading diagnostics...</div>
    </div>
    <div class="section" style="margin-top: 1.5rem;">
      <div class="section-title">S&amp;C Assistant</div>
      <div class="ai-section">
        <div class="ai-config">
          <label>Model:</label>
          <select id="ai-model">
            <option value="anthropic/claude-sonnet-4-5">claude-sonnet-4-5</option>
            <option value="anthropic/claude-haiku-4-5">claude-haiku-4-5</option>
            <option value="openai/gpt-4o">gpt-4o</option>
            <option value="openai/gpt-4o-mini">gpt-4o-mini</option>
            <option value="meta-llama/llama-3.3-70b-instruct">llama-3.3-70b</option>
          </select>
          <button class="ai-context-toggle" id="ai-context-toggle" onclick="toggleContextPreview()">show context</button>
        </div>
        <pre class="ai-context-preview" id="ai-context-preview">Loading readiness context...</pre>
        <div class="ai-messages" id="ai-messages">
          <div class="placeholder" style="margin: auto;">Ask anything about today's readiness, training load, or programming.</div>
        </div>
        <div class="ai-status" id="ai-status"></div>
        <div class="ai-input-row">
          <textarea class="ai-input" id="ai-input" placeholder="e.g. Should I train heavy today? What does my fatigue profile suggest?" rows="1"></textarea>
          <button class="ai-clear-btn" onclick="clearChat()">Clear</button>
          <button class="ai-send-btn" id="ai-send-btn" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // FETCH HELPERS
    // ═══════════════════════════════════════════════════════
    
    async function fetchTodayCheckin() {
      try {
        const resp = await fetch('/api/readiness/today');
        if (resp.status === 404) return null;
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.json();
      } catch (err) {
        console.error('Error fetching check-in:', err);
        throw new Error(`Failed to load check-in: ${err.message}`);
      }
    }
    
async function fetchSessionsList(days) {
  try {
    const d = new Date();
    const start = new Date(d.getFullYear(), d.getMonth(), d.getDate() - days);
    const startStr = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
    const resp = await fetch(`/api/workout-sessions?limit=100&start_date=${startStr}`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    return await resp.json();
  } catch (err) {
    console.error('Error fetching sessions list:', err);
    throw new Error(`Failed to load sessions: ${err.message}`);
  }
}
    
    async function fetchSessionDetail(sessionId) {
      try {
        const resp = await fetch(`/api/workout-sessions/${sessionId}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        return await resp.json();
      } catch (err) {
        console.error(`Error fetching session detail for ${sessionId}:`, err);
        return null;
      }
    }
    
    // ═══════════════════════════════════════════════════════
    // CALCULATION HELPERS
    // ═══════════════════════════════════════════════════════
    
    function computeSubjectiveFatigue(checkinOrNull) {
      if (!checkinOrNull) {
        return {
          score: null,
          components: null,
          reason: 'No check-in recorded for today'
        };
      }
      
      const tiredness = (checkinOrNull.tiredness || 0) / 4;
      const recovery = (checkinOrNull.perceived_recovery || 0) / 4;
      const soreness = (
        (checkinOrNull.sore_quad_dom || 0) +
        (checkinOrNull.sore_posterior || 0) +
        (checkinOrNull.sore_upper_push || 0) +
        (checkinOrNull.sore_upper_pull || 0)
      ) / 16;
      
      const normalized = 0.45 * tiredness + 0.30 * recovery + 0.25 * soreness;
      const score0to10 = Math.round(normalized * 10 * 100) / 100;
      
      return {
        score: score0to10,
        components: {
          tiredness: checkinOrNull.tiredness || 0,
          recovery: checkinOrNull.perceived_recovery || 0,
          quad_soreness: checkinOrNull.sore_quad_dom || 0,
          posterior_soreness: checkinOrNull.sore_posterior || 0,
          push_soreness: checkinOrNull.sore_upper_push || 0,
          pull_soreness: checkinOrNull.sore_upper_pull || 0
        }
      };
    }
    
    function computeSessionVolume(session, sessionDetail) {
      if (!sessionDetail || !sessionDetail.summary) return 0;
        return sessionDetail.summary.volume || 0;
      }
    
    // ═══════════════════════════════════════════════════════
    // RENDER HELPERS
    // ═══════════════════════════════════════════════════════
    
    function formatDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const year = d.getFullYear();
      return `${year}-${month}-${day}`;
    }
    
    function renderError(message) {
      return `<div class="error">${message}</div>`;
    }
    
    function renderSection1(checkin, fatigue) {
      let html = '<div class="section"><div class="section-title">Subjective Fatigue</div>';
      
      if (fatigue.score === null) {
        html += `<div class="placeholder">${fatigue.reason}</div>`;
      } else {
        const comp = fatigue.components;
        html += `
          <div class="fatigue-score">
            <div class="fatigue-details">
              <div class="detail-row">
                <span class="detail-label">Tiredness</span>
                <span class="detail-value">${comp.tiredness}/4</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Perceived Recovery</span>
                <span class="detail-value">${comp.recovery}/4</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Soreness (Quad)</span>
                <span class="detail-value">${comp.quad_soreness}/4</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Soreness (Posterior)</span>
                <span class="detail-value">${comp.posterior_soreness}/4</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Soreness (Push)</span>
                <span class="detail-value">${comp.push_soreness}/4</span>
              </div>
              <div class="detail-row">
                <span class="detail-label">Soreness (Pull)</span>
                <span class="detail-value">${comp.pull_soreness}/4</span>
              </div>
            </div>
            <div class="score-box">
              <div class="score-label">Fatigue Score</div>
              <div class="score-number">${fatigue.score}</div>
              <div class="score-range">0 – 10</div>
            </div>
          </div>
        `;
      }
      
      html += '</div>';
      return html;
    }
    
    function renderSection2(sessions7Day, sessions28Day) {
      let html = '<div class="section"><div class="section-title">7-Day Rolling Volume</div>';
      
      if (!sessions7Day || sessions7Day.length === 0) {
        html += '<div class="placeholder">No workouts logged in the last 7 days</div>';
        html += '</div>';
        return html;
      }
      
      // Calculate 7-day volume
      let volume7DayTotal = 0;
      let sessionRows = '';
      
      for (const session of sessions7Day) {
        const volLbs = session._volumeLbs || 0;
        volume7DayTotal += volLbs;
        const dateStr = formatDate(session.workout_date);
        const title = session.workout_title || '(Untitled)';
        sessionRows += `
          <tr>
            <td>${dateStr}</td>
            <td>${title}</td>
            <td class="volume-value">${Math.round(volLbs).toLocaleString()}</td>
          </tr>
        `;
      }
      
      // Calculate 28-day baseline
      let volume28DayTotal = 0;
      for (const session of sessions28Day) {
        const volLbs = session._volumeLbs || 0;
        volume28DayTotal += volLbs;
      }
      const baselineWeeklyAvg = volume28DayTotal / 26;
      
      // Calculate objective load score (0-10)
      const objectiveScore = Math.min(10, Math.max(0, baselineWeeklyAvg > 0 ? (volume7DayTotal / baselineWeeklyAvg) * 5 : 0));
      
      html += `
        <div class="volume-section">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Session</th>
                <th style="text-align: right;">Volume (lbs)</th>
              </tr>
            </thead>
            <tbody>
              ${sessionRows}
            </tbody>
          </table>
          
          <div class="volume-summary">
            <div class="summary-box">
              <div class="summary-label">7-Day Total</div>
              <div class="summary-value">${Math.round(volume7DayTotal).toLocaleString()}</div>
              <div class="summary-note">lbs</div>
            </div>
            <div class="summary-box">
              <div class="summary-label">6mo Avg</div>
              <div class="summary-value">${Math.round(baselineWeeklyAvg).toLocaleString()}</div>
              <div class="summary-note">lbs/week</div>
            </div>
            <div class="summary-box">
              <div class="summary-label">Objective Load Score</div>
              <div class="summary-value">${objectiveScore.toFixed(1)}</div>
              <div class="summary-note">0-10</div>
            </div>
          </div>
        </div>
      `;
      
      html += '</div>';
      return html;
    }
    
    function renderSection3(fatigue, sessions7Day, sessions28Day) {
      let fatigueNum = fatigue.score !== null ? fatigue.score : '—';
      
      let volume7DayTotal = 0;
      for (const session of sessions7Day) {
        volume7DayTotal += session._volumeLbs || 0;
      }
      
      let volume28DayTotal = 0;
      for (const session of sessions28Day) {
        volume28DayTotal += session._volumeLbs || 0;
      }
      const baselineWeeklyAvg = volume28DayTotal / 26;
      const objectiveScore = Math.min(10, Math.max(0, baselineWeeklyAvg > 0 ? (volume7DayTotal / baselineWeeklyAvg) * 5 : 0));
      const combinedScore = fatigue.score !== null
          ? ((0.80 * fatigue.score) + (0.20 * objectiveScore)).toFixed(2)    
          : '—';

      return `
        <div class="section">
          <div class="section-title">Raw Numbers</div>
          <div class="raw-numbers">
            <div class="raw-box">
              <div class="raw-label">Subjective Fatigue</div>
              <div class="raw-number">${fatigueNum}</div>
            </div>
            <div class="raw-box">
              <div class="raw-label">Objective Load Score</div>
              <div class="raw-number">${objectiveScore.toFixed(1)}</div>
              <div class="raw-range">0 - 10</div>
            </div>
            <div class="raw-box">
                <div class="raw-label">Combined Score</div>
                <div class="raw-number">${combinedScore}</div>
                <div class="raw-range">0 - 10</div>
            </div>
          </div>
        </div>
      `;
    }
    
    // ═══════════════════════════════════════════════════════
    // MAIN LOAD & RENDER
    // ═══════════════════════════════════════════════════════
    
    async function loadAndRender() {
      const container = document.getElementById('diagnostics');
      
      try {
        // Fetch check-in and sessions lists in parallel
        const [checkin, sessions7, sessions28] = await Promise.all([
          fetchTodayCheckin(),
          fetchSessionsList(7),
          fetchSessionsList(180)
        ]);
        
        // Fetch full session details for 7-day sessions
        const sessionDetails7 = await Promise.all(
          sessions7.map(s => fetchSessionDetail(s.hevy_workout_id))
        );
        
        // Fetch full session details for 28-day sessions
        const sessionDetails28 = await Promise.all(
          sessions28.map(s => fetchSessionDetail(s.hevy_workout_id))
        );
        
        // Enrich sessions with volume data
        for (let i = 0; i < sessions7.length; i++) {
          sessions7[i]._volumeLbs = computeSessionVolume(sessions7[i], sessionDetails7[i]);
        }
        for (let i = 0; i < sessions28.length; i++) {
          sessions28[i]._volumeLbs = computeSessionVolume(sessions28[i], sessionDetails28[i]);
        }
        
        // Compute fatigue
        const fatigue = computeSubjectiveFatigue(checkin);
        
        // Render all sections
        let html = '';
        html += renderSection1(checkin, fatigue);
        html += renderSection2(sessions7, sessions28);
        html += renderSection3(fatigue, sessions7, sessions28);
        
        container.innerHTML = html;
        
        // Update timestamp
        const now = new Date();
        const timeStr = now.toLocaleString();
        document.getElementById('last-updated').textContent = `Updated ${timeStr}`;

        readinessContext = buildSystemPrompt(checkin, fatigue, sessions7);
        setContextPreview(readinessContext);
        
      } catch (err) {
        console.error('Load error:', err);
        container.innerHTML = renderError(err.message);
      }
    }

    // ═══════════════════════════════════════════════════════
    // AI S&C ASSISTANT
    // ═══════════════════════════════════════════════════════

    const OPENROUTER_API_KEY = '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';
    const OPENROUTER_URL = 'https://openrouter.ai/api/v1/chat/completions';

    let chatHistory = [];
    let readinessContext = null;

    function buildSystemPrompt(checkin, fatigue, sessions7) {
      const today = new Date().toLocaleDateString('en-CA');
      let lines = [
        `You are a strength and conditioning coach assistant. You have access to today's readiness and recent training data. Be direct, practical, and specific. Avoid generic advice.`,
        ``,
        `DATE: ${today}`,
        ``
      ];
      if (checkin && fatigue.score !== null) {
        const c = fatigue.components;
        lines.push(`READINESS & FATIGUE:`);
        lines.push(`- Fatigue Score: ${fatigue.score}/10`);
        lines.push(`- Tiredness: ${c.tiredness}/4`);
        lines.push(`- Perceived Recovery: ${c.recovery}/4`);
        lines.push(`- Quad Soreness: ${c.quad_soreness}/4`);
        lines.push(`- Posterior Soreness: ${c.posterior_soreness}/4`);
        lines.push(`- Push Soreness: ${c.push_soreness}/4`);
        lines.push(`- Pull Soreness: ${c.pull_soreness}/4`);
        if (checkin.upper_joint_stress != null) lines.push(`- Upper Joint Stress: ${checkin.upper_joint_stress}/4`);
        if (checkin.lower_joint_stress != null) lines.push(`- Lower Joint Stress: ${checkin.lower_joint_stress}/4`);
        lines.push(``);
      } else {
        lines.push(`READINESS: No check-in recorded for today.`);
        lines.push(``);
      }
      if (sessions7 && sessions7.length > 0) {
        lines.push(`RECENT SESSIONS (last 7 days):`);
        for (const s of sessions7) {
          const d = formatDate(s.workout_date);
          const title = s.workout_title || '(Untitled)';
          const modality = s.modality ? ` [${s.modality}]` : '';
          const srpe = s.srpe != null ? ` sRPE ${s.srpe}` : '';
          const dur = s.duration_minutes ? ` ${s.duration_minutes}min` : '';
          lines.push(`- ${d}: ${title}${modality}${dur}${srpe}`);
        }
        lines.push(``);
      } else {
        lines.push(`RECENT SESSIONS: No sessions in the last 7 days.`);
        lines.push(``);
      }
      lines.push(`Answer questions about training readiness, session selection, programming adjustments, and fatigue management based on this data.`);
      return lines.join('\n');
    }

    function setContextPreview(text) {
      document.getElementById('ai-context-preview').textContent = text;
    }

    function toggleContextPreview() {
      const el = document.getElementById('ai-context-preview');
      const btn = document.getElementById('ai-context-toggle');
      const visible = el.style.display === 'block';
      el.style.display = visible ? 'none' : 'block';
      btn.textContent = visible ? 'show context' : 'hide context';
    }

    function appendMessage(role, content, streaming = false) {
      const container = document.getElementById('ai-messages');
      const placeholder = container.querySelector('.placeholder');
      if (placeholder) placeholder.remove();
      const wrapper = document.createElement('div');
      wrapper.className = `ai-msg ${role}`;
      wrapper.innerHTML = `
        <div class="ai-msg-label">${role === 'user' ? 'You' : 'Assistant'}</div>
        <div class="ai-msg-bubble${streaming ? ' streaming' : ''}">${escapeHtml(content)}</div>
      `;
      container.appendChild(wrapper);
      container.scrollTop = container.scrollHeight;
      return wrapper.querySelector('.ai-msg-bubble');
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\n/g, '<br>');
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('ai-status');
      el.textContent = msg;
      el.className = 'ai-status' + (isError ? ' error' : '');
    }

    function clearChat() {
      chatHistory = [];
      const container = document.getElementById('ai-messages');
      container.innerHTML = '<div class="placeholder" style="margin: auto;">Ask anything about today\'s readiness, training load, or programming.</div>';
      setStatus('');
    }

    async function sendMessage() {
      const input = document.getElementById('ai-input');
      const sendBtn = document.getElementById('ai-send-btn');
      const userText = input.value.trim();
      if (!userText) return;
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      setStatus('Thinking...');
      appendMessage('user', userText);
      chatHistory.push({ role: 'user', content: userText });
      const systemPrompt = readinessContext || 'You are a strength and conditioning coach assistant. No readiness data is currently available.';
      const model = document.getElementById('ai-model').value;
      const bubbleEl = appendMessage('assistant', '', true);
      try {
        const resp = await fetch(OPENROUTER_URL, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': window.location.origin,
            'X-Title': 'Hevy Fatigue Diagnostics'
          },
          body: JSON.stringify({
            model,
            stream: true,
            messages: [
              { role: 'system', content: systemPrompt },
              ...chatHistory
            ]
          })
        });
        if (!resp.ok) {
          const errBody = await resp.text();
          throw new Error(`HTTP ${resp.status}: ${errBody}`);
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let fullContent = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n').filter(l => l.startsWith('data: '));
          for (const line of lines) {
            const data = line.slice(6).trim();
            if (data === '[DONE]') continue;
            try {
              const parsed = JSON.parse(data);
              const delta = parsed.choices?.[0]?.delta?.content || '';
              if (delta) {
                fullContent += delta;
                bubbleEl.innerHTML = escapeHtml(fullContent);
                document.getElementById('ai-messages').scrollTop = document.getElementById('ai-messages').scrollHeight;
              }
            } catch (_) { /* skip malformed SSE chunks */ }
          }
        }
        bubbleEl.classList.remove('streaming');
        chatHistory.push({ role: 'assistant', content: fullContent });
        setStatus('');
      } catch (err) {
        bubbleEl.innerHTML = `<span style="color:var(--danger)">Error: ${escapeHtml(err.message)}</span>`;
        bubbleEl.classList.remove('streaming');
        chatHistory.pop();
        setStatus(err.message, true);
      } finally {
        sendBtn.disabled = false;
        input.focus();
      }
    }
    
    // ═══════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════
    
    document.addEventListener('DOMContentLoaded', () => {
      loadAndRender();
      
      document.getElementById('refresh-btn').addEventListener('click', () => {
        document.getElementById('diagnostics').innerHTML = '<div class="placeholder loading">Loading diagnostics...</div>';
        loadAndRender();
      });

      const input = document.getElementById('ai-input');
      input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
    });
  </script>
</body>
