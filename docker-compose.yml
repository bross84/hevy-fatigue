name: hevy-fatigue

services:
  hevy-fatigue:
    image: ghcr.io/bross84/hevy-fatigue:latest
    build: .   # kept for local dev — override with: docker compose up --build
    container_name: hevy-fatigue
    restart: unless-stopped
    environment:
      - DB_PATH=/data/hevy_fatigue.db
    ports:
      - mode: ingress
        target: 8000
        published: "8125" # change as needed
        protocol: tcp
    volumes:
      - hevy-data:/data
    networks:
      - hevy-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/sync/status')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  hevy-data:
    driver: local

networks:
  hevy-net:
    driver: bridge
